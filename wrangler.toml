name = "aortic-ai-api"
main = "src/index.ts"
compatibility_date = "2026-03-10"
workers_dev = true

[vars]
UPLOAD_URL_TTL_SECONDS = "900"
INFERENCE_MODE = "webhook"
INFERENCE_WEBHOOK_TIMEOUT_MS = "25000"
INFERENCE_MAX_INPUT_BYTES = "104857600"
API_BASE_URL = "https://aortic-ai-api.we085197.workers.dev"
INFERENCE_WEBHOOK_URL = "https://aortic-ai-api.we085197.workers.dev/providers/mock-inference"

[[r2_buckets]]
binding = "R2_RAW"
bucket_name = "aortic-ct-raw"

[[r2_buckets]]
binding = "R2_MASK"
bucket_name = "aortic-mask-out"

[[d1_databases]]
binding = "DB"
database_name = "aortic_meta"
database_id = "db7d7c1c-43b3-4eec-a33c-335ca12ae944"

[[queues.producers]]
binding = "SEG_QUEUE"
queue = "seg-jobs"

[[queues.consumers]]
queue = "seg-jobs"
max_batch_size = 10
max_batch_timeout = 30
