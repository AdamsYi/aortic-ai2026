name: Validate Main

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build:web

      - name: Build worker
        run: npm run build

      - name: Validate schemas and unit tests
        run: npm run test:schema && npm run test:unit
